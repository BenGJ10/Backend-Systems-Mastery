<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Title Already Taken • Feedback</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100 min-h-screen">

<nav class="border-b border-slate-700 bg-slate-900/70 backdrop-blur-sm sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold tracking-tight">
      <span class="text-blue-500">Feedback</span> Collector
    </h1>
  </div>
</nav>

<main class="max-w-3xl mx-auto px-6 py-32 text-center">
  <div class="bg-slate-800/60 border border-red-800/40 rounded-2xl p-10 shadow-xl">
    <div class="text-6xl mb-6">⚠️</div>
    <h2 class="text-3xl font-bold text-red-400 mb-4">This title already exists!</h2>
    <p class="text-slate-300 mb-8 text-lg">
      Someone already used this title.<br>Please choose a different one.
    </p>
    <a href="/"
       class="inline-block bg-blue-600 hover:bg-blue-700 transition px-10 py-4 rounded-xl font-semibold text-lg shadow-lg">
      ← Try again
    </a>
  </div>
</main>

</body>
</html>
