<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Share Feedback • Docker + Spring Boot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: { primary: '#3b82f6', primarydark: '#1d4ed8' }
            }
          }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100 min-h-screen">

<!-- Navbar -->
<nav class="border-b border-slate-700 bg-slate-900/70 backdrop-blur-sm sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight">
            <span class="text-primary">Feedback</span> Collector
        </h1>
        <div class="text-sm text-slate-400">
            Spring Boot • Java • Docker
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="max-w-3xl mx-auto px-6 py-16">
    <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-8 shadow-2xl backdrop-blur-sm">

        <h2 class="text-3xl font-bold mb-2 text-center">Leave your thoughts</h2>
        <p class="text-slate-400 text-center mb-10">Your feedback is saved privately as .txt files</p>

        <form action="/create" method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-slate-300 mb-2">
                    Title <span class="text-red-400">*</span>
                </label>
                <input
                        type="text"
                        id="title"
                        name="title"
                        required
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
                        placeholder="Give it a short title..."
                />
            </div>

            <div>
                <label for="text" class="block text-sm font-medium text-slate-300 mb-2">
                    Your Message / Document
                </label>
                <textarea
                        id="text"
                        name="text"
                        rows="12"
                        required
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition font-mono text-sm"
                        placeholder="Write your feedback here..."
                ></textarea>
            </div>

            <button
                    type="submit"
                    class="w-full bg-primary hover:bg-primarydark transition py-4 rounded-xl font-semibold text-lg shadow-lg"
            >
                Save Feedback
            </button>
        </form>
    </div>
</main>

<footer class="text-center text-slate-500 text-sm py-8 border-t border-slate-800">
    Learning Docker Volumes • Spring Boot Edition
</footer>

</body>
</html>
